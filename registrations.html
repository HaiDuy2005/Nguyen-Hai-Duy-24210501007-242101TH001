```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh Sách Đăng Ký</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="index.html">Code Academy</a>

<div class="navbar-nav ms-auto">
<a class="nav-link text-white" href="index.html">Trang Chủ</a>
<a class="nav-link text-white" href="courses.html">Khóa Học</a>
<a class="nav-link text-white" href="register.html">Đăng Ký</a>
<a class="nav-link text-white" href="registrations.html">Danh Sách</a>
</div>
</div>
</nav>

<div class="container py-5">

<h2>Danh Sách Đăng Ký</h2>

<div class="d-flex justify-content-between mb-3">

<h5>
Tổng đăng ký:
<span id="count">0</span>
</h5>

<button
class="btn btn-danger"
onclick="deleteAll()">
Xóa Tất Cả
</button>

</div>

<table class="table table-bordered table-striped">

<thead>
<tr>
<th>Họ Tên</th>
<th>Email</th>
<th>SĐT</th>
<th>Lớp</th>
<th>Khóa Học</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="tableData">
</tbody>

</table>

</div>

<footer class="bg-dark text-white text-center py-3">
<p class="mb-1">Nguyễn Hải Duy</p>
<p class="mb-0">MSSV: 24210501007 - Lớp: 242101TH001</p>
</footer>

<script>

function loadTable(){

let data =
JSON.parse(
localStorage.getItem("registrations")
) || [];

document.getElementById("count")
.innerText = data.length;

let html = "";

for(let i=0;i<data.length;i++){

html += `
<tr>
<td>${data[i].name}</td>
<td>${data[i].email}</td>
<td>${data[i].phone}</td>
<td>${data[i].classroom}</td>
<td>${data[i].course}</td>
<td>
<button
class="btn btn-danger btn-sm"
onclick="deleteStudent(${i})">
Xóa
</button>
</td>
</tr>
`;

}

document.getElementById("tableData")
.innerHTML = html;

}

function deleteStudent(index){

let data =
JSON.parse(
localStorage.getItem("registrations")
) || [];

data.splice(index,1);

localStorage.setItem(
"registrations",
JSON.stringify(data)
);

loadTable();

}

function deleteAll(){

if(confirm("Bạn có chắc muốn xóa tất cả?")){

localStorage.removeItem(
"registrations"
);

loadTable();

}

}

loadTable();

</script>

</body>
</html>
```
