```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Ký Khóa Học</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="index.html">Code Academy</a>

<div class="navbar-nav ms-auto">
<a class="nav-link text-white" href="index.html">Trang Chủ</a>
<a class="nav-link text-white" href="courses.html">Khóa Học</a>
<a class="nav-link text-white" href="register.html">Đăng Ký</a>
<a class="nav-link text-white" href="registrations.html">Danh Sách</a>
</div>
</div>
</nav>

<div class="container py-5">

<h2 class="mb-4">Đăng Ký Khóa Học</h2>

<form id="registerForm">

<div class="mb-3">
<label class="form-label">Họ tên</label>
<input type="text" id="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Số điện thoại</label>
<input type="text" id="phone" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Lớp</label>
<input type="text" id="classroom" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Khóa học</label>
<select id="course" class="form-select">

<option>HTML & CSS</option>
<option>JavaScript</option>
<option>Bootstrap 5</option>
<option>PHP</option>
<option>MySQL</option>
<option>Python</option>
<option>ReactJS</option>
<option>NodeJS</option>

</select>
</div>

<button type="submit" class="btn btn-success">
Đăng Ký
</button>

</form>

</div>

<footer class="bg-dark text-white text-center py-3">
<p class="mb-1">Nguyễn Hải Duy</p>
<p class="mb-0">MSSV: 24210501007 - Lớp: 242101TH001</p>
</footer>

<script>

document
.getElementById("registerForm")
.addEventListener("submit", function(e){

e.preventDefault();

let name =
document.getElementById("name").value.trim();

let email =
document.getElementById("email").value.trim();

let phone =
document.getElementById("phone").value.trim();

let classroom =
document.getElementById("classroom").value.trim();

let course =
document.getElementById("course").value;

if(name === ""){
alert("Vui lòng nhập họ tên");
return;
}

if(!email.includes("@")){
alert("Email không hợp lệ");
return;
}

if(!/^[0-9]{9,11}$/.test(phone)){
alert("Số điện thoại không hợp lệ");
return;
}

let registrations =
JSON.parse(
localStorage.getItem("registrations")
) || [];

registrations.push({
name,
email,
phone,
classroom,
course
});

localStorage.setItem(
"registrations",
JSON.stringify(registrations)
);

alert("Đăng ký thành công!");

this.reset();

});

</script>

</body>
</html>
```
